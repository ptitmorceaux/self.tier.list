networks:
  cloudflared_proxy:
    external: true
    
services:

  postgres:
    image: postgres:15
    container_name: selftierlist-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_NAME}
      POSTGRES_PORT: ${POSTGRES_PORT}
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    networks:
      - default
      - cloudflared_proxy
  
  fastapi:
    build:
      context: ./fastapi
      dockerfile: Dockerfile
    image: selftierlist-fastapi:latest
    container_name: selftierlist-fastapi
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:${POSTGRES_PORT}/${POSTGRES_NAME}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGO=${JWT_ALGO}
      - API_PORT=${API_PORT}
      - URL_PATH_PREFIX=${URL_PATH_PREFIX}
    depends_on:
      - postgres
    networks:
      - default
      - cloudflared_proxy
  
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: selftierlist-nginx:latest
    container_name: selftierlist-nginx
    depends_on:
      - fastapi
    networks:
      - default
      - cloudflared_proxy
