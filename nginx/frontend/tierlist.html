<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tier List</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .tierlist-editor {
      background: white;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      padding: 30px;
      margin: 30px 0;
    }

    .tierlist-header {
      margin-bottom: 30px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 20px;
    }

    .tierlist-header input,
    .tierlist-header textarea {
      font-size: 16px;
      margin-bottom: 10px;
    }

    .tierlist-title-input {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .image-upload {
      position: relative;
      border: 2px dashed var(--primary);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: var(--transition);
      background: rgba(79, 70, 229, 0.05);
    }

    .image-upload:hover {
      background: rgba(79, 70, 229, 0.1);
    }

    .image-upload input[type="file"] {
      display: none;
    }

    .image-upload.dragging {
      background: rgba(79, 70, 229, 0.2);
      border-color: var(--primary-dark);
    }

    .tierlist-container {
      display: flex;
      gap: 15px;
      margin-top: 30px;
    }

    .tier-column {
      flex: 0 0 80px;
      display: flex;
      flex-direction: column;
    }

    .tier-label {
      background: var(--light);
      padding: 10px;
      text-align: center;
      font-weight: 600;
      border-radius: var(--radius);
      margin-bottom: 10px;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    .tier-label input {
      width: 100%;
      padding: 5px;
      font-size: 12px;
      margin: 2px 0;
    }

    .tier-name {
      width: 100%;
      padding: 5px;
      text-align: center;
      font-size: 12px;
    }

    .tier-color-picker {
      width: 50px;
      height: 30px;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      margin: 0 auto;
    }

    .tier-items {
      flex: 1;
      background: var(--light);
      border-radius: var(--radius);
      padding: 10px;
      min-height: 80px;
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 8px;
    }

    .tier-item {
      position: relative;
      width: 60px;
      height: 60px;
      background: white;
      border-radius: 4px;
      overflow: hidden;
      cursor: grab;
      transition: var(--transition);
      border: 2px solid transparent;
    }

    .tier-item:hover {
      border-color: var(--primary);
      box-shadow: var(--shadow-lg);
    }

    .tier-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .tier-item.dragging {
      opacity: 0.5;
      cursor: grabbing;
    }

    .tier-item .remove-btn {
      position: absolute;
      top: 0;
      right: 0;
      background: rgba(239, 68, 68, 0.9);
      color: white;
      border: none;
      padding: 2px 4px;
      font-size: 12px;
      cursor: pointer;
      display: none;
      border-radius: 0 0 0 4px;
    }

    .tier-item:hover .remove-btn {
      display: block;
    }

    .images-pool {
      margin-top: 30px;
      padding-top: 30px;
      border-top: 2px solid var(--border);
    }

    .images-pool h4 {
      margin-bottom: 15px;
      color: var(--text-light);
    }

    .images-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .upload-preview {
      width: 60px;
      height: 60px;
      background: var(--light);
      border-radius: 4px;
      overflow: hidden;
      cursor: grab;
      transition: var(--transition);
      border: 2px solid var(--border);
      position: relative;
    }

    .upload-preview:hover {
      border-color: var(--primary);
      box-shadow: var(--shadow-lg);
    }

    .upload-preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .upload-preview.uploading {
      opacity: 0.5;
    }

    .upload-preview .remove-btn {
      position: absolute;
      top: 0;
      right: 0;
      background: rgba(239, 68, 68, 0.9);
      color: white;
      border: none;
      padding: 2px 4px;
      font-size: 10px;
      cursor: pointer;
      display: none;
      border-radius: 0 0 0 4px;
    }

    .upload-preview:hover .remove-btn {
      display: block;
    }

    .tierlist-actions {
      display: flex;
      gap: 10px;
      margin-top: 30px;
      flex-wrap: wrap;
    }

    .viewer-only {
      display: none;
    }

    .editor-only {
      display: block;
    }

    @media (max-width: 768px) {
      .tierlist-container {
        flex-direction: column;
      }

      .tier-column {
        flex: 1;
      }

      .tierlist-actions {
        flex-direction: column;
      }

      .tierlist-actions .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar"></nav>

  <div class="page">
    <div class="container">
      <div class="tierlist-editor">
        <!-- Mode lecture -->
        <div id="viewer-mode" class="viewer-only">
          <div class="tierlist-header">
            <h1 id="viewer-title"></h1>
            <p id="viewer-description" style="color: var(--text-light); font-size: 16px; margin-top: 8px;"></p>
            <p id="viewer-creator" style="font-size: 13px; color: var(--text-lighter); margin-top: 12px; display: flex; align-items: center; gap: 6px;"><span>📅</span><span></span></p>
          </div>

          <div id="viewer-actions" class="controls"></div>

          <div id="viewer-tierlist" class="tierlist-container"></div>
        </div>

        <!-- Mode édition -->
        <div id="editor-mode" class="editor-only">
          <div class="tierlist-header">
            <input type="text" id="title-input" class="tierlist-title-input" placeholder="📝 Titre de votre tier list">
            <textarea id="description-input" placeholder="✍️ Description de votre tier list (optionnel)" style="margin-top: 10px;"></textarea>
            <div style="margin-top: 16px; font-size: 14px; color: var(--text-light); font-weight: 500; display: flex; align-items: center; gap: 10px;">
              <span>👁️ Visibilité:</span> 
              <select id="privacy-select">
                <option value="false">🌍 Publique</option>
                <option value="true">🔒 Privée</option>
              </select>
            </div>
          </div>

          <div class="controls">
            <button id="save-btn" class="btn btn-success">💾 Enregistrer les modifications</button>
            <button id="reset-btn" class="btn btn-warning">🔄 Réinitialiser (tout vers _blank)</button>
            <button id="delete-btn" class="btn btn-danger">🗑️ Supprimer cette tier list</button>
          </div>

          <div class="image-upload" id="image-upload-zone">
            <input type="file" id="image-input" accept="image/*" multiple>
            <div style="pointer-events: none;">
              <p style="font-size: 32px; margin-bottom: 12px;">📤</p>
              <p style="font-weight: 600; font-size: 16px; margin-bottom: 8px;">Glissez-déposez vos images ici</p>
              <p style="font-size: 13px; color: var(--text-light); margin-top: 8px;">ou cliquez pour sélectionner • PNG, JPG, WebP • Max 5 MB par image</p>
            </div>
          </div>

          <div class="tierlist-container" id="tierlist-editor-container"></div>

          <div class="images-pool" id="unclassified-section">
            <h4>📦 Images en attente de classement</h4>
            <div class="images-grid" id="images-grid"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/pages/tierlist.js"></script>
</body>
</html>
