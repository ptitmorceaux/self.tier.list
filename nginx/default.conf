server {
    listen 80;
    server_name localhost;

    # Dossier où se trouve ton code front-end dans le container
    root /usr/share/nginx/html;
    
    # Très important : définit quel fichier charger par défaut à la racine
    index index.html;

    # 1. Sécurité : Empêcher le listage des fichiers
    autoindex off; 

    # 2. Sécurité : Bloquer l'accès au dossier des composants
    location /components/ {
        deny all;
        return 403;
    }

    # 3. Gestion des URLs
    location / {
        # Redirige /index.html ou /index vers / (URL propre)
        if ($request_uri ~ ^/index(\.html)?$) {
            return 301 /;
        }

        # Redirige *.html vers l'URL sans extension
        if ($request_uri ~ ^/(.*)\.html$) {
            return 301 /$1;
        }

        # LOGIQUE CORRECTE :
        # - $uri : cherche le fichier exact (ex: /style.css)
        # - $uri/ : cherche un dossier ET utilise la directive 'index' (essentiel pour /)
        # - $uri.html : cherche le fichier html correspondant
        try_files $uri $uri/ $uri.html =404;
    }

    # 4. Gestion centralisée des erreurs
    error_page 400 401 402 403 404 405 406 407 408 409 410 411 412 413 414 415 416 417 418 419 420 421 422 423 424 425 426 429 431 444 450 451 495 496 497 498 500 501 502 503 504 506 507 508 510 511 521 522 523 525 530 599 /error;

    location = /error {
        root /var/www/error/;
        try_files /$status.html /unknown.html;
        internal;
    }
}